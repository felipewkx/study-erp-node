<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ERP Web</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #0f0;
        }

        #chat {
            width: 90%;
            max-width: 600px;
            margin: 20px auto;
            background: black;
            padding: 15px;
            height: 400px;
            overflow-y: auto;
            border: 2px solid #0f0;
        }

        #inputArea {
            width: 90%;
            max-width: 600px;
            margin: auto;
            display: flex;
        }

        input {
            flex: 1;
            padding: 10px;
            background: black;
            color: #0f0;
            border: 1px solid #0f0;
        }

        button {
            padding: 10px;
            background: #0f0;
            border: none;
            cursor: pointer;
        }

        .msg {
            margin: 5px 0;
        }
    </style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
    <input type="text" id="input" placeholder="Digite aqui..." />
    <button onclick="enviar()">Enviar</button>
</div>

<script src="script.js"></script>
</body>
</html>
